version: '3.8'


services:
  broker:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mars_net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion_service:
    build: 
      context: ./ingestion_service
    environment:
      - SIMULATOR_URL=http://host.docker.internal:8080
      - BROKER_URL=amqp://guest:guest@broker:5672/
      - POLL_INTERVAL=5
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - mars_net

networks:
  mars_net:
    driver: bridge